services:
  scheduler:
    build: .
    command: ["python", "-m", "src.scheduler.runner"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ${SHORT_TERM_TRADER_PATH:-../short-term-trader}:/sibling/short-term-trader:ro
      - ${STOCK_RECOMMENDER_PATH:-../stock-recommender}:/sibling/stock-recommender:ro
    environment:
      SHORT_TERM_TRADER_PATH: /sibling/short-term-trader
      STOCK_RECOMMENDER_PATH: /sibling/stock-recommender
    restart: unless-stopped

  web:
    build: .
    command: ["streamlit", "run", "app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    env_file:
      - .env
    environment:
      # The `scheduler` service owns all ticking; don't start a second one here.
      INPROCESS_SCHEDULER: "0"
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    depends_on:
      - scheduler
    restart: unless-stopped
